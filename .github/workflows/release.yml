name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos-dmg:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: brew install just cmake

      - name: Set version
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "AZAD_VERSION=$version" >> "$GITHUB_ENV"
          echo "DMG_PATH=dist/Azad-${version}.dmg" >> "$GITHUB_ENV"

      - name: Import Developer ID certificate
        env:
          APPLE_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          cert_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/azad-signing.keychain-db"
          printf '%s' "$APPLE_DEVELOPER_ID_CERTIFICATE_BASE64" | base64 --decode > "$cert_path"
          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$cert_path" -P "$APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security list-keychains -d user -s "$keychain_path" "$HOME/Library/Keychains/login.keychain-db"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_KEYCHAIN_PASSWORD" "$keychain_path"
          identity="$(security find-identity -v -p codesigning "$keychain_path" | awk '/Developer ID Application/{print $2; exit}')"
          if [[ -z "$identity" ]]; then
            echo "Developer ID Application identity not found in imported certificate" >&2
            exit 1
          fi
          echo "AZAD_SIGNING_IDENTITY=$identity" >> "$GITHUB_ENV"

      - name: Store notarization credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "azad-notarization" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"

      - name: Build, sign, notarize, and package DMG
        env:
          AZAD_NOTARIZATION_PROFILE: azad-notarization
        run: just dist

      - name: Verify distribution artifact
        run: |
          codesign --verify --deep --strict --verbose=4 dist/Azad.app
          xcrun stapler validate dist/Azad.app
          xcrun stapler validate "$DMG_PATH"
          spctl -a -vvv -t open --context context:primary-signature "$DMG_PATH"

      - name: Upload GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "Azad $GITHUB_REF_NAME" --notes ""
          gh release upload "$GITHUB_REF_NAME" "$DMG_PATH" --clobber
