name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: brew install just cmake

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version

      - name: Verify
        run: just verify
